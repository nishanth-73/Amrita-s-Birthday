<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="bm-wrap">
    <canvas id="bm-canvas"></canvas>
    <canvas id="bm-p-canvas"></canvas>
    <div id="bm-polaroid">
      <div class="caption">🎉 HAPPY BIRTHDAY! 🎂</div>
      <img src="birthday.gif" style="width:200px; height:auto; display:block;">
      <button id="loveBtn">💌 Open Letter</button>
      <div id="letterBox">
        <div class="letter-content">
          <p id="letterText"></p>
        </div>
      </div>

        <rect x="65" y="110" width="70" height="42" rx="4" fill="#ff69b4"/>
        <rect x="60" y="105" width="80" height="14" rx="4" fill="#ff1493"/>
        <rect x="55" y="98" width="90" height="12" rx="4" fill="#ff69b4"/>
        <rect x="65" y="110" width="70" height="5" fill="#ff1493" opacity="0.4"/>
        <!-- Frosting drips -->
        <path d="M65 105 Q70 98 75 105 Q80 98 85 105 Q90 98 95 105 Q100 98 105 105 Q110 98 115 105 Q120 98 125 105 Q130 98 135 105" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.7"/>
        <!-- Candles -->
        <rect x="88" y="88" width="6" height="14" rx="2" fill="#ffdd57"/>
        <rect x="106" y="84" width="6" height="18" rx="2" fill="#a78bfa"/>
        <!-- Flames -->
        <ellipse cx="91" cy="86" rx="3" ry="4" fill="#ff8c00"/>
        <ellipse cx="91" cy="85" rx="2" ry="3" fill="#ffdd57"/>
        <ellipse cx="109" cy="82" rx="3" ry="4" fill="#ff8c00"/>
        <ellipse cx="109" cy="81" rx="2" ry="3" fill="#ffdd57"/>
        <!-- Left cat body -->
        <ellipse cx="48" cy="130" rx="22" ry="26" fill="#f472b6"/>
        <ellipse cx="48" cy="118" rx="18" ry="18" fill="#f472b6"/>
        <!-- Left cat ears -->
        <polygon points="34,104 30,90 44,100" fill="#f472b6"/>
        <polygon points="62,104 66,90 52,100" fill="#f472b6"/>
        <polygon points="35,103 32,93 43,100" fill="#ffb6d9"/>
        <polygon points="61,103 64,93 53,100" fill="#ffb6d9"/>
        <!-- Left cat face -->
        <ellipse cx="43" cy="116" rx="4" ry="5" fill="#1a0010"/>
        <ellipse cx="53" cy="116" rx="4" ry="5" fill="#1a0010"/>
        <ellipse cx="43" cy="115" rx="2" ry="2.5" fill="#fff" opacity="0.6"/>
        <ellipse cx="53" cy="115" rx="2" ry="2.5" fill="#fff" opacity="0.6"/>
        <path d="M46 122 Q48 125 50 122" fill="none" stroke="#1a0010" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="36" y1="118" x2="30" y2="116" stroke="#1a0010" stroke-width="1"/>
        <line x1="36" y1="120" x2="30" y2="120" stroke="#1a0010" stroke-width="1"/>
        <line x1="60" y1="118" x2="66" y2="116" stroke="#1a0010" stroke-width="1"/>
        <line x1="60" y1="120" x2="66" y2="120" stroke="#1a0010" stroke-width="1"/>
        <!-- Left cat arm raised -->
        <path d="M66 120 Q80 108 88 112" fill="none" stroke="#f472b6" stroke-width="8" stroke-linecap="round"/>
        <!-- Right cat body -->
        <ellipse cx="154" cy="130" rx="22" ry="26" fill="#c084fc"/>
        <ellipse cx="154" cy="118" rx="18" ry="18" fill="#c084fc"/>
        <!-- Right cat ears -->
        <polygon points="140,104 136,90 150,100" fill="#c084fc"/>
        <polygon points="168,104 172,90 158,100" fill="#c084fc"/>
        <polygon points="141,103 138,93 149,100" fill="#e9d5ff"/>
        <polygon points="167,103 170,93 159,100" fill="#e9d5ff"/>
        <!-- Right cat face -->
        <ellipse cx="149" cy="116" rx="4" ry="5" fill="#1a0010"/>
        <ellipse cx="159" cy="116" rx="4" ry="5" fill="#1a0010"/>
        <ellipse cx="149" cy="115" rx="2" ry="2.5" fill="#fff" opacity="0.6"/>
        <ellipse cx="159" cy="115" rx="2" ry="2.5" fill="#fff" opacity="0.6"/>
        <path d="M152 122 Q154 125 156 122" fill="none" stroke="#1a0010" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="142" y1="118" x2="136" y2="116" stroke="#1a0010" stroke-width="1"/>
        <line x1="142" y1="120" x2="136" y2="120" stroke="#1a0010" stroke-width="1"/>
        <line x1="166" y1="118" x2="172" y2="116" stroke="#1a0010" stroke-width="1"/>
        <line x1="166" y1="120" x2="172" y2="120" stroke="#1a0010" stroke-width="1"/>
        <!-- Right cat arm raised -->
        <path d="M136 120 Q122 108 114 112" fill="none" stroke="#c084fc" stroke-width="8" stroke-linecap="round"/>
        <!-- Confetti -->
        <rect x="20" y="40" width="6" height="6" rx="1" fill="#ff1493" transform="rotate(25,23,43)"/>
        <rect x="170" y="30" width="6" height="6" rx="1" fill="#a78bfa" transform="rotate(-15,173,33)"/>
        <rect x="90" y="15" width="5" height="5" rx="1" fill="#ffdd57" transform="rotate(40,92,17)"/>
        <rect x="140" y="55" width="5" height="8" rx="1" fill="#34d399" transform="rotate(20,142,59)"/>
        <rect x="30" y="65" width="4" height="8" rx="1" fill="#60a5fa" transform="rotate(-30,32,69)"/>
        <circle cx="160" cy="75" r="3" fill="#ff69b4"/>
        <circle cx="40" cy="45" r="3" fill="#a78bfa"/>
        <circle cx="120" cy="20" r="2" fill="#ffdd57"/>
      </svg>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
